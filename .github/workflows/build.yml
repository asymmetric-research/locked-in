name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # v1.15.4
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Prepare binary
        run: |
          mkdir -p dist
          cp target/release/locked-in dist/locked-in-linux-x64
          chmod +x dist/locked-in-linux-x64

      - name: Upload binary as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: locked-in-${{ github.sha }}
          path: dist/locked-in-linux-x64
          retention-days: 90

      - name: Upload binary to latest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: locked-in-latest
          path: dist/locked-in-linux-x64
          retention-days: 90
