name: Test Action

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release

      - name: Test clean repo passes
        run: ./target/release/lockfile-guard

      - name: Test violations detected
        run: |
          echo "npm install" > test-violations.sh
          echo "pnpm add eslint" >> test-violations.sh
          ! ./target/release/lockfile-guard
